<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Browse Collection — Store 89</title>
<link rel="stylesheet" href="css/styles.css">
<style>
.collection-layout { display: grid; grid-template-columns: 240px 1fr; gap: 0; min-height: calc(100vh - var(--nav-height)); }
.sidebar {
  border-right: 1px solid var(--border); padding: 2rem 1.5rem;
  position: sticky; top: var(--nav-height); height: calc(100vh - var(--nav-height));
  overflow-y: auto; background: var(--off-black);
}
.sidebar-section { margin-bottom: 2rem; padding-bottom: 2rem; border-bottom: 1px solid var(--border); }
.sidebar-section:last-child { border-bottom: none; }
.sidebar-title { font-family: var(--font-mono); font-size: 0.62rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); margin-bottom: 1rem; }
.filter-option { display: flex; align-items: center; gap: 0.6rem; margin-bottom: 0.6rem; }
.filter-option label { font-family: var(--font-mono); font-size: 0.65rem; letter-spacing: 0.1em; color: var(--white); cursor: pointer; transition: color 0.2s; }
.filter-option input[type="checkbox"] { appearance: none; width: 14px; height: 14px; border: 1px solid var(--border); background: none; cursor: pointer; flex-shrink: 0; transition: all 0.2s; }
.filter-option input[type="checkbox"]:checked { background: var(--accent); border-color: var(--accent); }
.filter-option input[type="checkbox"]:checked + label { color: var(--accent); }
.filter-option input[type="radio"] { appearance: none; width: 14px; height: 14px; border: 1px solid var(--border); border-radius: 50%; background: none; cursor: pointer; flex-shrink: 0; transition: all 0.2s; }
.filter-option input[type="radio"]:checked { background: var(--accent); border-color: var(--accent); }
.price-range-row { display: flex; align-items: center; gap: 0.5rem; }
.price-input { background: var(--card-bg); border: 1px solid var(--border); color: var(--white); font-family: var(--font-mono); font-size: 0.7rem; padding: 0.4rem 0.6rem; width: 80px; outline: none; }
.price-input:focus { border-color: var(--accent); }
.collection-main { padding: 2.5rem; }
.collection-topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; gap: 1rem; flex-wrap: wrap; }
.search-wrap { position: relative; flex: 1; max-width: 400px; }
.search-input { width: 100%; background: var(--card-bg); border: 1px solid var(--border); color: var(--white); font-family: var(--font-body); font-size: 0.9rem; padding: 0.7rem 1rem 0.7rem 2.8rem; outline: none; transition: border-color 0.2s; }
.search-input:focus { border-color: var(--accent); }
.search-icon { position: absolute; left: 0.9rem; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 0.9rem; pointer-events: none; }
.sort-select { background: var(--card-bg); border: 1px solid var(--border); color: var(--white); font-family: var(--font-mono); font-size: 0.68rem; letter-spacing: 0.1em; padding: 0.7rem 1rem; outline: none; transition: border-color 0.2s; cursor: pointer; }
.sort-select:focus { border-color: var(--accent); }
.results-count { font-family: var(--font-mono); font-size: 0.65rem; letter-spacing: 0.15em; color: var(--muted); text-transform: uppercase; }
.no-results { text-align: center; padding: 6rem 2rem; font-family: var(--font-display); font-size: 3rem; color: #2a2a2a; letter-spacing: 0.05em; }
.mobile-filter-toggle { display: none; font-family: var(--font-mono); font-size: 0.65rem; letter-spacing: 0.15em; text-transform: uppercase; padding: 0.6rem 1.2rem; border: 1px solid var(--border); color: var(--muted); background: none; transition: all 0.2s; }
.mobile-filter-toggle:hover { border-color: var(--accent); color: var(--accent); }
@media (max-width: 900px) {
  .collection-layout { grid-template-columns: 1fr; }
  .sidebar { display: none; position: fixed; left: 0; top: 0; bottom: 0; z-index: 400; width: 280px; height: 100vh; padding-top: 5rem; border-right: 1px solid var(--border); transform: translateX(-100%); transition: transform 0.3s; }
  .sidebar.mobile-open { display: block; transform: translateX(0); }
  .mobile-filter-toggle { display: block; }
  .collection-main { padding: 1.5rem; }
}
</style>
</head>
<body>
<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>

<nav id="mainNav" class="nav-scrolled">
  <a href="index.html" class="logo">STORE<span>89</span></a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="collection.html" class="active">Browse Collection</a></li>
    <li><a href="custom-studio.html">Customize Yours</a></li>
    <li><a href="bw-collection.html">B&amp;W Apparels</a></li>
    <li><a href="index.html#contact">Contact</a></li>
  </ul>
  <a href="cart.html" class="nav-cart">Cart <span class="cart-badge" id="cartBadge">0</span></a>
  <button class="hamburger" id="navToggle"><span></span><span></span><span></span></button>
</nav>
<div class="mobile-menu" id="mobileMenu">
  <a href="index.html">Home</a><a href="collection.html">Collection</a>
  <a href="custom-studio.html">Customize</a><a href="bw-collection.html">B&amp;W</a>
  <a href="index.html#contact">Contact</a><a href="cart.html" style="color:var(--accent)">Cart</a>
</div>

<div style="padding-top:var(--nav-height);">
  <div class="page-header" style="padding-top:3rem;">
    <div class="section-label">— Full Catalog</div>
    <h1 class="section-title">BROWSE<br>COLLECTION</h1>
    <p style="color:var(--muted);font-size:0.9rem;margin-top:0.5rem;">T-Shirts, Posters & Limited Editions</p>
  </div>
  <div class="collection-layout">
    <aside class="sidebar" id="filterSidebar">
      <div class="sidebar-section">
        <div class="sidebar-title">Category</div>
        <div class="filter-option"><input type="checkbox" id="f-tee" checked onchange="applyFilters()"><label for="f-tee">T-Shirts</label></div>
        <div class="filter-option"><input type="checkbox" id="f-poster" checked onchange="applyFilters()"><label for="f-poster">Posters</label></div>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-title">Price Range</div>
        <div class="price-range-row">
          <input type="number" class="price-input" id="priceMin" placeholder="₹0" value="0" oninput="applyFilters()">
          <span style="color:var(--muted);font-size:0.8rem;">—</span>
          <input type="number" class="price-input" id="priceMax" placeholder="₹1000" value="1000" oninput="applyFilters()">
        </div>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-title">Style</div>
        <div class="filter-option"><input type="checkbox" id="f-bw" onchange="applyFilters()"><label for="f-bw">B&amp;W Only</label></div>
        <div class="filter-option"><input type="checkbox" id="f-new" onchange="applyFilters()"><label for="f-new">New Arrivals</label></div>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-title">Sort By</div>
        <div class="filter-option"><input type="radio" name="sort" id="sort-pop" value="popular" checked onchange="applyFilters()"><label for="sort-pop">Popular</label></div>
        <div class="filter-option"><input type="radio" name="sort" id="sort-new" value="newest" onchange="applyFilters()"><label for="sort-new">Newest</label></div>
        <div class="filter-option"><input type="radio" name="sort" id="sort-plo" value="price-asc" onchange="applyFilters()"><label for="sort-plo">Price: Low → High</label></div>
        <div class="filter-option"><input type="radio" name="sort" id="sort-phi" value="price-desc" onchange="applyFilters()"><label for="sort-phi">Price: High → Low</label></div>
      </div>
      <button class="btn-ghost" onclick="resetFilters()" style="width:100%;justify-content:center;">Reset Filters</button>
    </aside>
    <main class="collection-main">
      <div class="collection-topbar">
        <div style="display:flex;align-items:center;gap:1rem;flex-wrap:wrap;flex:1;">
          <button class="mobile-filter-toggle" onclick="document.getElementById('filterSidebar').classList.toggle('mobile-open')">⚙ Filters</button>
          <div class="search-wrap">
            <span class="search-icon">⌕</span>
            <input type="text" class="search-input" id="searchInput" placeholder="Search products..." oninput="applyFilters()">
          </div>
        </div>
        <select class="sort-select" id="sortSelect" onchange="applyFilters()">
          <option value="popular">Popular</option>
          <option value="newest">Newest</option>
          <option value="price-asc">Price: Low → High</option>
          <option value="price-desc">Price: High → Low</option>
        </select>
        <span class="results-count" id="resultsCount">12 Products</span>
      </div>
      <div class="products-grid" id="collectionGrid"></div>
      <div id="noResults" class="no-results" style="display:none;">NO RESULTS FOUND</div>
    </main>
  </div>
</div>

<footer>
  <a href="index.html" class="logo">STORE<span>89</span></a>
  <span class="footer-copy">© 2024 Store 89</span>
</footer>

<div class="modal-overlay" id="quickViewModal">
  <div class="modal-box">
    <button class="modal-close" onclick="closeQV()">✕</button>
    <div style="display:flex;flex-wrap:wrap;">
      <div id="qvImg" style="flex:1;min-width:220px;background:var(--card-bg);display:flex;align-items:center;justify-content:center;padding:3rem;"></div>
      <div id="qvInfo" style="flex:1;min-width:220px;padding:2rem;display:flex;flex-direction:column;gap:1rem;"></div>
    </div>
  </div>
</div>

<script src="js/products.js"></script>
<script src="js/main.js"></script>
<script>
function renderCard(p) {
  const isPoster = p.category === 'poster';
  const badge = p.badge ? `<div class="product-badge ${p.isNew?'new':p.isBW?'bw':''}">${p.badge}</div>` : '';
  return `
    <div class="product-card" onclick="openQV(${p.id})">
      <div class="product-img">
        <div class="product-placeholder"><svg width="${isPoster?'90':'120'}" height="${isPoster?'130':'120'}" viewBox="${p.viewBox}">${p.svg}</svg></div>
        ${badge}
        <button class="product-quick" onclick="event.stopPropagation();addCard(${p.id})">Add to Cart →</button>
      </div>
      <div class="product-info">
        <div class="product-name">${p.name}</div>
        <div class="product-meta">
          <span class="product-type">${isPoster?'Poster':'T-Shirt'}</span>
          <span class="product-price">₹${p.price.toLocaleString()}</span>
        </div>
      </div>
    </div>`;
}

function applyFilters() {
  const allP = getProducts();
  const tee = document.getElementById('f-tee').checked;
  const poster = document.getElementById('f-poster').checked;
  const bwOnly = document.getElementById('f-bw').checked;
  const newOnly = document.getElementById('f-new').checked;
  const minP = parseFloat(document.getElementById('priceMin').value) || 0;
  const maxP = parseFloat(document.getElementById('priceMax').value) || 99999;
  const query = document.getElementById('searchInput').value.toLowerCase().trim();
  const sortVal = document.getElementById('sortSelect').value;

  let filtered = allP.filter(p => {
    if (!tee && p.category === 'tee') return false;
    if (!poster && p.category === 'poster') return false;
    if (bwOnly && !p.isBW) return false;
    if (newOnly && !p.isNew) return false;
    if (p.price < minP || p.price > maxP) return false;
    if (query && !p.name.toLowerCase().includes(query) && !p.category.toLowerCase().includes(query)) return false;
    return true;
  });

  if (sortVal === 'newest') filtered.sort((a,b) => new Date(b.dateAdded) - new Date(a.dateAdded));
  else if (sortVal === 'price-asc') filtered.sort((a,b) => a.price - b.price);
  else if (sortVal === 'price-desc') filtered.sort((a,b) => b.price - a.price);

  document.getElementById('resultsCount').textContent = `${filtered.length} Product${filtered.length !== 1 ? 's' : ''}`;
  const grid = document.getElementById('collectionGrid');
  if (filtered.length === 0) {
    grid.innerHTML = '';
    document.getElementById('noResults').style.display = 'block';
  } else {
    grid.innerHTML = filtered.map(renderCard).join('');
    document.getElementById('noResults').style.display = 'none';
  }
}

function resetFilters() {
  document.getElementById('f-tee').checked = true;
  document.getElementById('f-poster').checked = true;
  document.getElementById('f-bw').checked = false;
  document.getElementById('f-new').checked = false;
  document.getElementById('priceMin').value = 0;
  document.getElementById('priceMax').value = 1000;
  document.getElementById('searchInput').value = '';
  document.getElementById('sortSelect').value = 'popular';
  applyFilters();
}

function addCard(id) {
  const p = getProducts().find(x => x.id === id);
  if (p) Cart.add(p, p.sizes ? p.sizes[0] : 'M');
}

function openQV(id) {
  const p = getProducts().find(x => x.id === id);
  if (!p) return;
  const isPoster = p.category === 'poster';
  document.getElementById('qvImg').innerHTML = `<svg width="${isPoster?'120':'150'}" height="${isPoster?'170':'150'}" viewBox="${p.viewBox}">${p.svg}</svg>`;
  const sizes = p.sizes || (isPoster ? ['A4','A3','A2'] : ['S','M','L','XL']);
  document.getElementById('qvInfo').innerHTML = `
    <div>
      <div class="section-label">— ${isPoster?'Poster':'T-Shirt'}</div>
      <h2 style="font-family:var(--font-display);font-size:2.2rem;line-height:1;margin-bottom:0.4rem;">${p.name}</h2>
      <div style="font-family:var(--font-mono);font-size:1rem;color:var(--accent);font-weight:700;margin-bottom:0.5rem;">₹${p.price.toLocaleString()}</div>
    </div>
    <p style="color:var(--muted);font-size:0.88rem;line-height:1.7;">${p.desc||''}</p>
    <div>
      <div class="form-label" style="margin-bottom:0.5rem;">Size</div>
      <div style="display:flex;gap:0.4rem;flex-wrap:wrap;" id="qvSizes">
        ${sizes.map((s,i)=>`<button onclick="pickSize(this)" style="font-family:var(--font-mono);font-size:0.62rem;letter-spacing:0.1em;padding:0.45rem 0.9rem;border:1px solid ${i===0?'var(--accent)':'var(--border)'};color:${i===0?'var(--accent)':'var(--muted)'};background:none;transition:all 0.2s;" data-size="${s}" ${i===0?'data-sel=""':''}>${s}</button>`).join('')}
      </div>
    </div>
    <button class="btn-primary" onclick="addQV(${id})" style="justify-content:center;">Add to Cart →</button>`;
  document.getElementById('quickViewModal').classList.add('open');
}

function pickSize(btn) {
  document.querySelectorAll('#qvSizes button').forEach(b => { b.style.borderColor='var(--border)'; b.style.color='var(--muted)'; b.removeAttribute('data-sel'); });
  btn.style.borderColor='var(--accent)'; btn.style.color='var(--accent)'; btn.setAttribute('data-sel','');
}

function addQV(id) {
  const p = getProducts().find(x => x.id === id);
  const sel = document.querySelector('#qvSizes [data-sel]');
  Cart.add(p, sel ? sel.dataset.size : (p.sizes?.[0] || 'M'));
  closeQV();
}

function closeQV() { document.getElementById('quickViewModal').classList.remove('open'); }
document.getElementById('quickViewModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeQV(); });

const urlParams = new URLSearchParams(window.location.search);
if (urlParams.get('category') === 'tee') document.getElementById('f-poster').checked = false;
else if (urlParams.get('category') === 'poster') document.getElementById('f-tee').checked = false;

applyFilters();
</script>
</body>
</html>
<script src="js/products.js"></script>
<script src="js/main.js"></script>
